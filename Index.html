<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#00a8ff">
    <title>JORDANX V4 | APK</title>
    
    <link rel="manifest" href="data:application/manifest+json,{'name':'JordanX V4','short_name':'JordanX','display':'standalone','start_url':'/','background_color':'#000000','theme_color':'#00a8ff','icons':[{'src':'https://i.imgur.com/your-icon.png','sizes':'512x512','type':'image/png'}]}">
    
    <style>
        :root { --blue: #00a8ff; --dark: #010101; --card: #0d0d0f; --green: #00ff41; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--dark); color: #fff; overflow-x: hidden; user-select: none; }

        /* HEADER JORDANX */
        header { 
            background: #000; padding: 25px; border-bottom: 2px solid var(--blue);
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(0, 168, 255, 0.3);
        }
        .logo { font-weight: 900; font-size: 22px; letter-spacing: 2px; }
        .logo span { color: var(--blue); }

        /* CONTAINER */
        .panel { padding: 20px; max-width: 500px; margin: auto; }

        /* MÓDULOS (ESTILO VÍDEO) */
        .module {
            background: var(--card); border: 1px solid #1a1a1e; padding: 20px;
            border-radius: 15px; margin-bottom: 15px; display: flex;
            justify-content: space-between; align-items: center;
        }
        .info h3 { font-size: 14px; color: #fff; }
        .info p { font-size: 10px; color: var(--blue); margin-top: 5px; font-weight: bold; }

        /* SWITCHES */
        .switch { position: relative; width: 45px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #222; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--blue); }
        input:checked + .slider:before { transform: translateX(21px); }

        /* CONSOLE TERMINAL (FUNDAMENTAL) */
        #console {
            background: #000; height: 300px; padding: 15px; border: 1px solid #1a1a1e;
            border-radius: 10px; font-family: 'Courier New', monospace; font-size: 11px;
            overflow-y: auto; color: var(--green); margin: 20px 0;
            line-height: 1.6; box-shadow: inset 0 0 20px rgba(0, 255, 65, 0.05);
        }

        /* BARRA DE PROGRESSO */
        .progress-wrap { width: 100%; background: #111; height: 8px; border-radius: 10px; margin-bottom: 20px; display: none; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: var(--blue); box-shadow: 0 0 15px var(--blue); transition: 0.1s; }

        /* BOTÃO DE INJEÇÃO MASTER */
        .btn-inject {
            background: var(--blue); color: #000; width: 100%; padding: 22px;
            border: none; border-radius: 15px; font-weight: 900; font-size: 16px;
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }
        .btn-inject:active { transform: scale(0.95); }
    </style>
</head>
<body>

<header>
    <div class="logo">JORDANX <span>V4 PRO</span></div>
    <div style="font-size: 10px; color: var(--green);">859L CORE ON</div>
</header>

<div class="panel">
    <div id="functions">
        </div>

    <div id="console">
        <div>[SYSTEM] JordanX V4 Core Loading...</div>
        <div>[AUTH] Connected to vitorzinw</div>
    </div>

    <div class="progress-wrap" id="p-wrap">
        <div class="progress-fill" id="p-fill"></div>
    </div>

    <button class="btn-inject" id="main-btn">INJETAR TUDO AGORA</button>
</div>

<script>
    // LISTA DE ARQUIVOS (AUXÍLIOS)
    const ASSETS = [
        "Headshotrick.xml", "UmpTrick.json", "HeadTrackingLock.json", "Sensitivity.so",
        "Norecoilking11.so", "Xitado head.ini", "precisiontrick.xml", "metadata.dell",
        "OTIMIZACAO SENSI.so", "arquivo.aimbot", "arquivo.aimlock", "zzzinnz.xml"
    ];

    const UI = [
        { n: 'AIMBOT HEAD VIP', d: 'Injeta Headshotrick.xml (859L)' },
        { n: 'AIMLOCK TRACKING', d: 'Ativa HeadTrackingLock.json' },
        { n: 'NO RECOIL EXTREME', d: 'Patching Norecoilking11.so' },
        { n: 'SENSI MOTO G56 5G', d: 'DPI & Buffer Optimization' },
        { n: 'BYPASS ANTI-LOG', d: 'Clean metadata.dell' },
        { n: '10.000 AUXÍLIOS REG', d: 'Massive Registration Load' }
    ];

    const fDiv = document.getElementById('functions');
    UI.forEach(m => {
        fDiv.innerHTML += `
            <div class="module">
                <div class="info"><h3>${m.n}</h3><p>${m.d}</p></div>
                <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
            </div>
        `;
    });

    const terminal = document.getElementById('console');
    const btn = document.getElementById('main-btn');
    const pFill = document.getElementById('p-fill');
    const pWrap = document.getElementById('p-wrap');

    function write(text, color = 'var(--green)') {
        const line = document.createElement('div');
        line.style.color = color;
        line.innerText = `[${new Date().toLocaleTimeString()}] > ${text}`;
        terminal.appendChild(line);
        terminal.scrollTop = terminal.scrollHeight;
    }

    btn.onclick = async () => {
        btn.disabled = true;
        pWrap.style.display = 'block';

        write("Starting 859 lines of logic...", "#00a8ff");
        
        // LOOP DAS 859 LINHAS
        for(let i = 1; i <= 859; i++) {
            if(i % 100 === 0) {
                write(`Processing Logic Line: ${i}/859...`, "#ffcc00");
                pFill.style.width = (i / 859 * 100) + "%";
                await new Promise(r => setTimeout(r, 150));
            }
            if(i === 250) write("Injecting: Headshotrick.xml", "white");
            if(i === 600) write("Injecting: 10,000 Aux Files...", "var(--blue)");
        }

        write(">>> JORDANX V4 PRO FULL ACTIVE <<<", "var(--green)");
        btn.innerText = "SISTEMA INJETADO";
        btn.style.background = "var(--green)";
    };
</script>
</body>
</html>
