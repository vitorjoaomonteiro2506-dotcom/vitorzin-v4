<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITORZIN SUPREMO V14 | ULTRA PREMIUM</title>
    <style>
        :root { --p: #a020f0; --bg: #030303; --card: #0a0a0a; --txt: #ffffff; --ok: #00ff7f; --bad: #ff3e3e; }
        body { background: var(--bg); color: var(--txt); font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .hidden { display: none !important; }
        
        /* --- Login Estilizado --- */
        .login-box { width: 350px; padding: 40px; background: var(--card); border: 1px solid var(--p); border-radius: 20px; text-align: center; box-shadow: 0 0 30px rgba(160, 32, 240, 0.2); }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid #222; color: #fff; border-radius: 10px; box-sizing: border-box; }
        
        /* --- Painel Gigante --- */
        .panel { width: 500px; height: 750px; background: var(--card); border: 2px solid var(--p); border-radius: 25px; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        header { padding: 25px; background: #000; border-bottom: 1px solid #1a1a1a; text-align: center; }
        header h1 { margin: 0; font-size: 1.8rem; letter-spacing: 4px; color: var(--p); text-shadow: 0 0 15px var(--p); }
        
        .nav { display: flex; background: #080808; border-bottom: 1px solid #1a1a1a; }
        .nav-btn { flex: 1; padding: 15px; border: none; background: transparent; color: #555; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .nav-btn.active { color: var(--p); background: #0f0f0f; border-bottom: 3px solid var(--p); }

        .main-content { flex: 1; padding: 25px; overflow-y: auto; }
        .section-title { font-size: 0.75rem; color: var(--p); text-transform: uppercase; margin: 20px 0 10px; display: flex; align-items: center; gap: 10px; opacity: 0.8; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: #1a1a1a; }

        /* --- Botões de Injeção --- */
        .btn-inj { width: 100%; padding: 18px; margin-bottom: 12px; background: #0d0d0d; border: 1px solid #1a1a1a; border-radius: 12px; color: #fff; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .btn-inj:hover { border-color: var(--p); background: #111; transform: scale(1.02); }
        .btn-inj span { font-weight: 600; font-size: 0.95rem; }
        .btn-inj .info { font-size: 0.65rem; color: #555; border: 1px solid #222; padding: 3px 7px; border-radius: 5px; }

        /* --- Terminal de Logs --- */
        .terminal { height: 120px; background: #000; border-top: 2px solid #1a1a1a; padding: 15px; font-family: 'Courier New', monospace; font-size: 0.75rem; color: var(--ok); overflow-y: auto; }
    </style>
</head>
<body>

<div id="login" class="login-box">
    <h1>VITORZIN V14</h1>
    <input type="text" id="u" placeholder="USUÁRIO">
    <input type="password" id="s" placeholder="SENHA">
    <button onclick="auth()" style="width:100%; padding: 15px; background: var(--p); border:none; color:white; border-radius:10px; cursor:pointer; font-weight:bold;">LOGIN</button>
</div>

<div id="panel" class="panel hidden">
    <header>
        <h1>VITORZIN SUPREMO</h1>
        <div id="ping" style="font-size: 0.7rem; color: #444;">LATENCY: 12ms | BYPASS: ACTIVE</div>
    </header>

    <div class="nav">
        <button class="nav-btn active" onclick="tab('t1')">AIM</button>
        <button class="nav-btn" onclick="tab('t2')">VISUAL</button>
        <button class="nav-btn" onclick="tab('t3')">SAFE</button>
    </div>

    <div class="main-content" id="t1">
        <div class="section-title">Memory Aim Control</div>
        <button class="btn-inj" onclick="run('STICK 💎', '0x30667008', '1000A0E3')">
            <span>💎 STICK MAGNETICO</span> <div class="info">LIBIL2CPP</div>
        </button>
        <button class="btn-inj" onclick="run('AIMLOCK RAGE', '0xEB4570', '0100A0E3')">
            <span>🎯 AIMLOCK PURO</span> <div class="info">ACTIVE</div>
        </button>
        <button class="btn-inj" onclick="run('AIM FOV', '0x30667015', '0.5;0.5;0.84')">
            <span>⭕ AIM FOV GERAL</span> <div class="info">360°</div>
        </button>

        <div class="section-title">Weapon Specific</div>
        <button class="btn-inj" onclick="run('M1887 SPEC', '0xEB4570', '0170A0E9')">
            <span>🔫 M1887 ONE-TAP</span> <div class="info">OFFSET</div>
        </button>
    </div>

    <div class="main-content hidden" id="t2">
        <div class="section-title">ESP & Chams</div>
        <button class="btn-inj" onclick="run('CHAMS F1', '0x30667008', 'Patch')">
            <span>⚪ JOGADOR BRANCO</span>
        </button>
        <button class="btn-inj" onclick="run('CHAMS F3', '0x30667012', 'Patch')">
            <span>🟣 JOGADOR ROXO</span>
        </button>
    </div>

    <div class="main-content hidden" id="t3">
        <div class="section-title">System & Anti-Ban</div>
        <button class="btn-inj" onclick="run('BYPASS', 'libarm_protect', 'V3')">
            <span>🛡️ ATIVAR BYPASS REAL</span>
        </button>
        <button class="btn-inj" onclick="run('SENSI 12GB', '0xA7D378', '00009642')">
            <span>🖱️ SENSI + REGEDIT 12GB</span>
        </button>
        <button class="btn-inj" onclick="run('CLEAR', 'Blacklist', 'Clean')">
            <span>🧹 LIMPAR LOGS (ANTI-BLK)</span>
        </button>
    </div>

    <div id="term" class="terminal">> System initialized. Waiting for injection...</div>
</div>

<script>
    function auth() {
        if(document.getElementById('u').value === "vitorzin" && document.getElementById('s').value === "1") {
            document.getElementById('login').classList.add('hidden');
            document.getElementById('panel').classList.remove('hidden');
        } else { alert("Falha no login!"); }
    }

    function tab(id) {
        document.querySelectorAll('.main-content').forEach(c => c.classList.add('hidden'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.remove('hidden');
        event.currentTarget.classList.add('active');
    }

    function run(name, off, hex) {
        const t = document.getElementById('term');
        t.innerHTML += `<br>> Executing ${name}...`;
        setTimeout(() => {
            t.innerHTML += `<br><span style="color:var(--p)">> [SUCCESS] Address: ${off} | Value: ${hex}</span>`;
            t.scrollTop = t.scrollHeight;
            if(window.Android) { window.Android.inject(off, hex); }
        }, 800);
    }
</script>
</body>
</html>
