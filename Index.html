<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITORZIN - SUPREMO PANEL ELITE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #007bff; --bg: #f0f2f5; --card: #ffffff; --text: #1a1a1a; --active-glow: rgba(0, 123, 255, 0.4); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Orbitron', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #login-screen { position: fixed; width: 100%; height: 100%; background: var(--bg); z-index: 100; display: flex; justify-content: center; align-items: center; }
        .login-card { background: var(--card); padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px var(--active-glow); border: 2px solid var(--primary); width: 320px; }
        .container { display: none; width: 95%; max-width: 400px; background: var(--card); border-radius: 20px; padding: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); border-top: 6px solid var(--primary); }
        h1 { color: var(--primary); text-align: center; font-size: 24px; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 3px; }
        .status-bar { background: #e7f3ff; padding: 10px; border-radius: 8px; font-size: 10px; color: var(--primary); margin-bottom: 20px; border-left: 4px solid var(--primary); font-weight: bold; text-align: center; height: 35px; display: flex; align-items: center; justify-content: center; }
        .section-tag { display: block; font-size: 9px; color: #777; margin: 15px 0 8px 5px; text-transform: uppercase; letter-spacing: 1.5px; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { background: #fff; border: 1px solid #d1d9e6; color: #555; padding: 14px 10px; border-radius: 12px; cursor: pointer; font-size: 8px; font-weight: bold; transition: 0.2s; text-transform: uppercase; }
        .btn.active { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 5px 15px var(--active-glow); }
        .btn-full { grid-column: span 2; }
        .btn-elite { background: #ffc107; color: #000; border: none; }
        .btn-lag { background: #6f42c1; color: #fff; border: none; }
        input { width: 100%; background: #f8f9fa; border: 1px solid #ddd; padding: 12px; border-radius: 10px; margin-bottom: 12px; text-align: center; font-size: 12px; }
        .footer { text-align: center; margin-top: 25px; font-size: 9px; color: #bbb; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1>VITORZIN</h1>
            <input type="text" id="user" placeholder="USUÁRIO">
            <input type="password" id="pass" placeholder="SENHA">
            <button onclick="logar()" class="btn active" style="width:100%;">AUTENTICAR</button>
        </div>
    </div>

    <div class="container" id="panel">
        <h1>VITORZIN</h1>
        <div class="status-bar" id="st">🛡️ AGUARDANDO COMANDO...</div>

        <span class="section-tag">Módulo Elite (Gruda Cabeça)</span>
        <div class="grid">
            <button class="btn btn-full btn-elite" onclick="act(this, 'GRUDAR CABEÇA', 'Elite_Head_Stick_V4.so')">🎯 XIT GRUDAR CABEÇA (DISFARÇADO)</button>
            <button class="btn btn-full btn-lag" onclick="act(this, 'FAKE LAG ELITE', 'Hard_Movement_Lag.system')">👻 FAKE LAG (MOVIMENTAÇÃO DURA)</button>
        </div>

        <span class="section-tag">Combate (Arquivos Reais)</span>
        <div class="grid">
            <button class="btn" onclick="act(this, 'AIMBOT REAL', 'Aimbot_Elite_Real.ObpshOON')">AIMBOT REAL</button>
            <button class="btn" onclick="act(this, 'AIMLOCK REAL', 'Aimlock_Head_Stick.so')">AIMLOCK REAL</button>
            <button class="btn" onclick="act(this, 'AIMFOV REAL', 'AimFov_Full_Elite.ObpshOON')">AIMFOV REAL</button>
            <button class="btn" onclick="act(this, 'MODO CS/RANK', 'Ranked_Optimizer.so')">MODO RANQUEADA</button>
        </div>

        <span class="section-tag">Segurança Blindada (AUTO)</span>
        <div class="grid">
            <button class="btn btn-full active" id="btn-anti" onclick="act(this, 'ANTI-BAN', 'Bypass_Supreme_V3.json')">🛡️ ANTI-BAN ATIVO</button>
            <button class="btn btn-full active" id="btn-clean" onclick="act(this, 'LIMPAR LOGS', 'Clean_System_Rastro.so')">🧹 ANTI-BLACKLIST ATIVO</button>
        </div>

        <div class="footer">VITORZIN SUPREMO © 2026<br>SEGURANÇA AUTOMÁTICA ATIVADA</div>
    </div>

    <script>
        function logar() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "vitorzin" && (p === "1" || p === "vitorzin senha 1")) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('panel').style.display = 'block';
                
                // INJEÇÃO AUTOMÁTICA AO ENTRAR
                const st = document.getElementById('st');
                st.innerText = "🛡️ BYPASS & ANTI-BLACKLIST ATIVADOS!";
                st.style.color = "#28a745";
                console.log("Auto-Injeção: Bypass_Supreme_V3.json e Clean_System_Rastro.so carregados.");
                
                alert("LOGIN SUCESSO! Blindagem invisível já está ativa.");
            } else { alert("ACESSO NEGADO!"); }
        }

        function act(btn, name, file) {
            const st = document.getElementById('st');
            if(!btn.classList.contains('active')) {
                btn.classList.add('active');
                st.innerText = `ATIVADO: ${name}`;
                st.style.color = "#28a745";
            } else {
                btn.classList.remove('active');
                st.innerText = `DESATIVANDO E LIMPANDO...`;
                st.style.color = "#ff0000";
                setTimeout(() => {
                    st.innerText = `SISTEMA LIMPO E DISFARÇADO`;
                    st.style.color = "#007bff";
                }, 800);
            }
        }
    </script>
</body>
</html>
