<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VITORZIN V30</title>
<style>
  body {
    background: transparent; /* Fundo transparente para o APK */
    font-family: 'Arial', sans-serif;
    color: white;
    margin: 0;
    padding: 0;
    overflow: hidden; /* Evita barras de rolagem */
  }
  .menu-container {
    width: 150px; /* Largura do menu */
    background: rgba(0, 0, 0, 0.7); /* Fundo semi-transparente */
    border-radius: 10px;
    padding: 10px;
    box-shadow: 0 0 15px rgba(0, 255, 0, 0.5); /* Sombra verde */
    text-align: center;
  }
  .menu-button {
    background: linear-gradient(45deg, #00ff00, #00aa00); /* Botão verde */
    border: none;
    color: white;
    padding: 10px 15px;
    margin: 5px 0;
    border-radius: 8px;
    width: 90%;
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    box-shadow: 0 4px 8px rgba(0, 255, 0, 0.3);
    transition: transform 0.2s, background 0.2s;
  }
  .menu-button:hover {
    transform: translateY(-2px);
    background: linear-gradient(45deg, #00aa00, #00ff00);
  }
  .close-button {
    background: linear-gradient(45deg, #ff0000, #aa0000); /* Botão vermelho */
  }
  .close-button:hover {
    background: linear-gradient(45deg, #aa0000, #ff0000);
  }
  .title {
    font-size: 20px;
    margin-bottom: 10px;
    color: #00ff00; /* Título verde */
    text-shadow: 0 0 5px #00ff00;
  }
</style>
</head>
<body>

<div class="menu-container">
  <div class="title">VITORZIN V30</div>
  <button class="menu-button" onclick="activateAimbot()">AIMBOT 100% HS</button>
  <button class="menu-button" onclick="activateAimLock()">AIMLOCK</button>
  <button class="menu-button" onclick="activateNoRecoil()">NO RECOIL</button>
  <button class="menu-button" onclick="activateAntenna()">ANTENA</button>
  <button class="menu-button" onclick="activateFastReload()">FAST RELOAD</button>
  <button class="menu-button close-button" onclick="Android.fecharPainel()">FECHAR</button>
</div>

<script>
  // Funções para ativar o Aimbot (elas conversam com o APK)
  function activateAimbot() {
    alert('AIMBOT 100% HS ATIVADO!'); // Confirma no site
    if (typeof AndroidAimbot !== 'undefined') {
      AndroidAimbot.activateAimbotHS(); // Chama a função no APK
    }
  }

  function activateAimLock() {
    alert('AIMLOCK ATIVADO!');
    // Adicione a lógica de AimLock aqui (se o APK tiver uma função específica)
  }

  function activateNoRecoil() {
    alert('NO RECOIL ATIVADO!');
    // Adicione a lógica de No Recoil aqui
  }

  function activateAntenna() {
    alert('ANTENA ATIVADA!');
    // Adicione a lógica de Antena aqui
  }

  function activateFastReload() {
    alert('FAST RELOAD ATIVADO!');
    // Adicione a lógica de Fast Reload aqui
  }

  // Não precisa de função para fechar, pois o botão já chama Android.fecharPainel()
</script>

</body>
</html>
