<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITORZINW MODS | SUPREMACY DASHBOARD</title>
    <style>
        /* DESIGN GRANDE E ELITE - ESTILO DARK/NEON */
        :root {
            --primary: #ff0000;
            --secondary: #00ff00;
            --bg: #050505;
            --card: #0f0f0f;
            --glow: rgba(255, 0, 0, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Consolas', monospace; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at center, #111 0%, #050505 100%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .main-container {
            width: 95%;
            max-width: 500px;
            background: var(--card);
            border: 2px solid var(--primary);
            border-radius: 20px;
            box-shadow: 0 0 40px var(--glow);
            padding: 20px;
            position: relative;
        }

        /* CABEÇALHO */
        .header {
            text-align: center;
            border-bottom: 2px solid #222;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .header h1 {
            font-size: 28px;
            letter-spacing: 5px;
            color: var(--primary);
            text-shadow: 0 0 15px var(--primary);
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            margin-top: 10px;
            color: #888;
        }

        /* CATEGORIAS */
        .category-label {
            font-size: 12px;
            color: var(--primary);
            text-transform: uppercase;
            margin: 15px 0 10px 5px;
            font-weight: bold;
        }

        /* BOTÕES GIGANTES */
        .grid-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-mod {
            background: #151515;
            border: 1px solid #333;
            color: #eee;
            padding: 15px 10px;
            border-radius: 10px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .btn-mod:hover {
            border-color: var(--primary);
            background: #200000;
            transform: translateY(-3px);
            box-shadow: 0 5px 15px var(--glow);
        }

        .btn-mod.active {
            border-color: var(--secondary);
            color: var(--secondary);
        }

        /* CONSOLE DE INJEÇÃO (MUITO GRANDE) */
        .console-box {
            background: #000;
            border: 1px solid #222;
            border-radius: 10px;
            margin-top: 20px;
            height: 150px;
            padding: 10px;
            font-size: 9px;
            overflow-y: auto;
            color: #00ff00;
            line-height: 1.4;
        }

        /* BARRA DE INSTALAÇÃO */
        .install-section {
            margin-top: 20px;
            text-align: center;
        }

        #progress-container {
            width: 100%;
            height: 6px;
            background: #222;
            border-radius: 10px;
            margin: 15px 0;
            display: none;
        }

        #progress-bar {
            width: 0%;
            height: 100%;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
            border-radius: 10px;
        }

        .btn-install {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 0 20px var(--glow);
        }

        .btn-install:disabled {
            background: #444;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* EFEITO DE SCANNER */
        .scanner {
            width: 100%;
            height: 2px;
            background: var(--primary);
            position: absolute;
            left: 0;
            top: 0;
            animation: scan 3s infinite linear;
            opacity: 0.3;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: 0%; }
            100% { top: 100%; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="scanner"></div>
    
    <div class="header">
        <h1>VITORZINW VIP</h1>
        <div class="status-bar">
            <span>DEVICE: MOTO G56 5G</span>
            <span id="ping">PING: 14ms</span>
            <span style="color:var(--secondary)">BYPASS: ON</span>
        </div>
    </div>

    <div class="category-label">Auxílios de Mira (Aimlock)</div>
    <div class="grid-options">
        <button class="btn-mod" onclick="toggleMod(this, 'Aim Headshot')">🎯 HEADSHOT 100%<br><small>UnityFS CAB-95c</small></button>
        <button class="btn-mod" onclick="toggleMod(this, 'No Recoil')">🔫 NO RECOIL<br><small>Weapontable</small></button>
        <button class="btn-mod" onclick="toggleMod(this, 'AimLock')">🔒 AIM LOCK<br><small>Skins Property</small></button>
        <button class="btn-mod" onclick="toggleMod(this, 'Track Mira')">🛰️ MIRA TRACK<br><small>AssetIndexer</small></button>
    </div>

    <div class="category-label">Segurança & Sistema</div>
    <div class="grid-options">
        <button class="btn-mod" onclick="toggleMod(this, 'Anti-Ban')">🛡️ ANTI-BAN V6<br><small>RyanX.dat</small></button>
        <button class="btn-mod" onclick="toggleMod(this, 'Limpar Logs')">🧹 LIMPAR LOGS<br><small>Config Auto</small></button>
    </div>

    <div class="console-box" id="console">
        [SYSTEM] Aguardando seleção de módulos...<br>
        [INFO] Versão 1000% Completa Carregada.<br>
    </div>

    <div class="install-section">
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <button class="btn-install" id="main-btn" onclick="instalarTudo()">INSTALAR MODS AGORA</button>
    </div>
</div>

<script>
    const arquivos = [
        "RyanX.dat", "antibanned.config", "weapontable.rTiCsnwDhogXLYLBnDzvZrhw5Ms=", 
        "weaponskin_property.e5MYGDudQ1Lvuuo8ZpIh8va49Hs=", "assetindexer.dTUSJEQWyZdReXUZnuO5HIjZxBA=",
        "resconf.WBNOBPOll8Av579NGIo8yAgpoM8="
    ];

    function toggleMod(btn, name) {
        btn.classList.toggle('active');
        addLog(`Módulo [${name}] selecionado.`);
    }

    function addLog(msg) {
        const console = document.getElementById('console');
        console.innerHTML += `> ${msg}<br>`;
        console.scrollTop = console.scrollHeight;
    }

    function instalarTudo() {
        const btn = document.getElementById('main-btn');
        const pCont = document.getElementById('progress-container');
        const pBar = document.getElementById('progress-bar');
        
        btn.disabled = true;
        btn.innerHTML = "INSTALANDO...";
        pCont.style.display = "block";

        let prog = 0;
        let fileIdx = 0;

        const timer = setInterval(() => {
            prog += Math.random() * 3;
            pBar.style.width = prog + "%";

            if(prog % 15 < 2 && fileIdx < arquivos.length) {
                addLog(`Instalando: ${arquivos[fileIdx]}...`);
                fileIdx++;
            }

            if(prog >= 100) {
                clearInterval(timer);
                addLog("<span style='color:var(--secondary)'>SUCESSO: Todos os arquivos injetados!</span>");
                addLog("Reinicie o Free Fire para aplicar.");
                btn.innerHTML = "INSTALADO COM SUCESSO";
                btn.style.background = "var(--secondary)";
            }
        }, 80);
    }

    // Efeito de Ping Real
    setInterval(() => {
        const p = Math.floor(Math.random() * 20) + 10;
        document.getElementById('ping').innerHTML = `PING: ${p}ms`;
    }, 2000);
</script>

</body>
</html>
