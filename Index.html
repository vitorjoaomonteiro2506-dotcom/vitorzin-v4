<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITORZIN SUPREMO V12</title>
    <style>
        :root {
            --primary: #8a2be2;
            --bg: #0a0a0a;
            --card: #151515;
            --text: #ffffff;
            --safe: #00ff7f;
            --danger: #ff4500;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .panel, .login-box {
            width: 350px;
            background: var(--card);
            border: 2px solid var(--primary);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(138, 43, 226, 0.3);
        }

        .hidden { display: none; }

        header {
            text-align: center;
            border-bottom: 1px solid #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
        }

        h1 { font-size: 1.4rem; color: var(--primary); margin: 0; }
        .status { font-size: 0.8rem; color: var(--safe); }

        .module { margin-bottom: 20px; }
        .module-title { 
            font-size: 0.9rem; 
            color: #888; 
            margin-bottom: 10px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="password"] {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            background: #000;
            border: 1px solid var(--primary);
            color: white;
            border-radius: 8px;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 12px;
            margin: 5px 0;
            border: none;
            border-radius: 8px;
            background: #222;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        button:active { transform: scale(0.98); }
        button:hover { background: #333; border: 1px solid var(--primary); }

        .btn-safe { border-left: 4px solid var(--safe); }
        .btn-stick { border-left: 4px solid #00ced1; background: #1a2a2a; }
        
        #log {
            background: #000;
            padding: 10px;
            border-radius: 5px;
            font-size: 0.75rem;
            color: var(--safe);
            height: 60px;
            overflow-y: auto;
            border: 1px solid #222;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>

<div id="login-screen" class="login-box">
    <header>
        <h1>VITORZIN LOGIN</h1>
    </header>
    <input type="password" id="passInput" placeholder="Digite sua senha...">
    <button onclick="verificarSenha()" style="background: var(--primary);">ENTRAR NO PAINEL</button>
</div>

<div id="main-panel" class="panel hidden">
    <header>
        <h1>VITORZIN SUPREMO V12</h1>
        <div class="status">🛡️ BYPASS SYSTEM: ACTIVE</div>
    </header>

    <div class="module">
        <div class="module-title">Segurança & Anti-Ban</div>
        <button class="btn-safe" onclick="exec('bypass')">🛡️ ATIVAR BYPASS (LIB PROTECT)</button>
        <button class="btn-safe" onclick="exec('antiblk')">🧹 ANTI-BLACKLIST (CLEANER)</button>
    </div>

    <div class="module">
        <div class="module-title">Funções VIP</div>
        <button class="btn-stick" onclick="exec('stick')">💎 ATIVAR STICK (MAGNETIC)</button>
        <div class="grid">
            <button onclick="exec('macro')">🔥 MACRO GELO</button>
            <button onclick="exec('sensi')">🖱️ SENSI 12GB</button>
        </div>
    </div>

    <div class="module">
        <div class="module-title">Visual Chams</div>
        <div class="grid">
            <button style="color: #fff;" onclick="exec('f1')">F1 BRANCO</button>
            <button style="color: #a020f0;" onclick="exec('f3')">F3 ROXO</button>
        </div>
    </div>

    <div id="log">Acesso autorizado.</div>
</div>

<script>
    // SISTEMA DE SENHA PERSONALIZADO
    function verificarSenha() {
        const p = document.getElementById('passInput').value;
        if (p === "vitorzin senha 1") {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('main-panel').classList.remove('hidden');
        } else {
            alert("Senha Incorreta!");
        }
    }

    function exec(cmd) {
        const log = document.getElementById('log');
        switch(cmd) {
            case 'bypass':
                log.innerText = "> Injetando Bypass...\n> Proteção de Memória OK!";
                break;
            case 'antiblk':
                log.innerText = "> Limpando logs...\n> UID Masked ✅";
                break;
            case 'stick':
                log.innerText = "> 💎 STICK ATIVO: Mira colada no inimigo!";
                break;
            case 'macro':
                log.innerText = "> Macro de agachamento/gelo rápido ON";
                break;
            case 'sensi':
                log.innerText = "> DPI 12GB RAM Aplicada (180%)";
                break;
            case 'f1':
                log.innerText = "> Chams F1 Branco ativado";
                break;
            case 'f3':
                log.innerText = "> Chams F3 Roxo ativado";
                break;
        }
    }
</script>

</body>
</html>
