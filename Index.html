<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Service</title>
    <style>
        :root { --red: #ff0000; --dark: #050505; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background: transparent; margin: 0; padding: 0; font-family: sans-serif; height: 100vh; overflow: hidden; }

        /* --- BOTÃO FLUTUANTE (LOGO) --- */
        #floatingIcon {
            width: 50px; height: 50px;
            background: rgba(255, 0, 0, 0.6); /* Vermelho semi-transparente */
            border: 2px solid #fff; border-radius: 50%;
            position: fixed; top: 20%; left: 10px;
            z-index: 10001; display: none; /* Só aparece após login */
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
            display: flex; justify-content: center; align-items: center;
            color: white; font-weight: bold; font-size: 10px;
        }

        /* --- MENU PRINCIPAL --- */
        #mainMenu {
            width: 300px; background: rgba(5, 5, 5, 0.98); border: 2px solid var(--red);
            border-radius: 12px; position: absolute; left: 50%; top: 50%;
            transform: translate(-50%, -50%); display: none; flex-direction: column; z-index: 9999;
        }

        header { background: #000; padding: 12px; border-bottom: 2px solid var(--red); text-align: center; border-radius: 10px 10px 0 0; }
        header h1 { margin: 0; font-size: 1rem; color: #fff; letter-spacing: 2px; }

        .content { height: 300px; overflow-y: auto; padding: 15px; }
        .func-box { background: #0a0a0a; border: 1px solid #1a1a1a; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
        .func-box span { color: #eee; font-size: 0.8rem; font-weight: bold; }

        /* SWITCH TOGGLE */
        .switch { position: relative; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; inset: 0; background: #333; border-radius: 20px; transition: .4s; }
        input:checked + .slider { background: var(--red); }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: .4s; }
        input:checked + .slider:before { transform: translateX(16px); }

        /* LOGIN */
        #loginScreen { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        input[type="password"] { padding: 15px; width: 80%; background: #111; border: 1px solid var(--red); color: #fff; text-align: center; border-radius: 8px; margin-bottom: 15px; }
        .login-btn { background: var(--red); color: white; border: none; padding: 15px 40px; font-weight: bold; border-radius: 8px; }
    </style>
</head>
<body>

<div id="loginScreen">
    <h1 style="color:white">SYSTEM <span style="color:red">UI</span></h1>
    <input type="password" id="pass" placeholder="SENHA">
    <button class="login-btn" onclick="auth()">LOGAR</button>
</div>

<div id="floatingIcon" onclick="toggleMenu()">MENU</div>

<div id="mainMenu">
    <header><h1>VITORZIN MOD</h1></header>
    <div class="content">
        <div class="func-box"><span>AIMLOCK HEAD</span><label class="switch"><input type="checkbox" onchange="exec('AIM', '0xEB4570', '0100A0E3')"><span class="slider"></span></label></div>
        <div class="func-box"><span>ESP LINE</span><label class="switch"><input type="checkbox" onchange="exec('ESP', 'DRAW', '1')"><span class="slider"></span></label></div>
        <div class="func-box"><span>ANTENA HEAD</span><label class="switch"><input type="checkbox" onchange="exec('ANT', '0x45A21', 'E3A00001')"><span class="slider"></span></label></div>
        <button onclick="toggleMenu()" style="width:100%; background:#222; color:white; border:none; padding:10px; margin-top:10px; border-radius:5px;">FECHAR MENU</button>
    </div>
</div>

<script>
    function auth() {
        const p = document.getElementById('pass').value;
        if(p === "1") {
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('floatingIcon').style.display = 'flex'; // Mostra o botão
        } else { alert("Senha Errada!"); }
    }

    function toggleMenu() {
        const m = document.getElementById('mainMenu');
        m.style.display = (m.style.display === 'none' || m.style.display === '') ? 'flex' : 'none';
    }

    function exec(n, o, h) {
        if(window.Android) {
            window.Android.injectMemory(o, h);
        }
        console.log("Ativado: " + n);
    }

    // Tornar o ícone arrastável (Opcional, mas ajuda no jogo)
    const icon = document.getElementById('floatingIcon');
    icon.ontouchmove = function(e) {
        let touch = e.touches[0];
        icon.style.left = touch.clientX - 25 + 'px';
        icon.style.top = touch.clientY - 25 + 'px';
    };
</script>
</body>
</html>
