<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { background: transparent; font-family: 'Courier New', monospace; color: #ff0000; margin: 0; padding: 10px; }
        .painel { width: 260px; background: rgba(0, 0, 0, 0.95); border: 2px solid #ff0000; border-radius: 5px; padding: 15px; box-shadow: 0 0 30px #ff0000; }
        .title { text-align: center; font-size: 22px; font-weight: 900; letter-spacing: 2px; margin-bottom: 10px; border-bottom: 2px solid #ff0000; }
        .section { font-size: 10px; color: #fff; margin-top: 10px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        button { background: #000; color: #ff0000; border: 1px solid #ff0000; padding: 12px 5px; font-size: 11px; font-weight: bold; cursor: pointer; }
        button.active { background: #ff0000; color: #000; box-shadow: 0 0 20px #ff0000; }
        .full { grid-column: span 2; background: #330000; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="painel">
        <div class="title">VITORZIN x GRANEJO</div>
        
        <div class="section">MODO APELAÇÃO (HS 100%)</div>
        <div class="grid">
            <button onclick="toggle(this, 'AIM_HEAD')">AIMBOT 100% HS</button>
            <button onclick="toggle(this, 'AIM_LOCK')">AIMLOCK BRABO</button>
            <button onclick="toggle(this, 'REG_GRANEJO')">REGEDIT GRANEJO</button>
            <button onclick="toggle(this, 'DPI_EMU')">DPI EMULADOR</button>
        </div>

        <div class="section">VISUAL & ESP (WALLHACK)</div>
        <div class="grid">
            <button onclick="toggle(this, 'ESP_LINE')">ESP LINHA VIP</button>
            <button onclick="toggle(this, 'ESP_BOX')">ESP BOX 4D</button>
            <button onclick="toggle(this, 'ESP_SKEL')">ESP ESQUELETO</button>
            <button onclick="toggle(this, 'ESP_DIST')">DISTÂNCIA</button>
        </div>

        <div class="section">BYPASS & SEGURANÇA</div>
        <div class="grid">
            <button class="full" onclick="toggle(this, 'ANTI_BAN')">ANTI-BAN ULTRA (BYPASS)</button>
            <button class="full" style="color:white;" onclick="fechar()">DELETAR RASTROS E SAIR</button>
        </div>
    </div>

    <script>
        function toggle(e, func) { 
            e.classList.toggle('active');
            if(window.XitVitorzin) { window.XitVitorzin.injetarFuncao(func); }
        }
        function fechar() { if(window.Android) window.Android.fecharPainel(); }
    </script>
</body>
</html>
