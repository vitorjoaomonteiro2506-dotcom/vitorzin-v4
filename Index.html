<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITORZIN - URIEL POWER MAX</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #007bff; --bg: #0b0e14; --card: #151921; --text: #ffffff; --danger: #ff4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Orbitron', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #login-screen { position: fixed; width: 100%; height: 100%; background: var(--bg); z-index: 100; display: flex; justify-content: center; align-items: center; }
        .login-card { background: var(--card); padding: 40px; border-radius: 20px; text-align: center; border: 2px solid var(--primary); width: 320px; }
        .container { display: none; width: 95%; max-width: 420px; background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid #333; }
        h1 { color: var(--primary); text-align: center; font-size: 18px; margin-bottom: 15px; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0, 123, 255, 0.5); }
        .status-bar { background: rgba(0, 123, 255, 0.1); padding: 8px; border-radius: 8px; font-size: 8px; color: var(--primary); margin-bottom: 15px; border: 1px solid var(--primary); text-align: center; }
        .section-tag { display: block; font-size: 8px; color: #555; margin: 10px 0 5px 5px; text-transform: uppercase; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .btn { background: #1c222d; border: 1px solid #333; color: #fff; padding: 12px 5px; border-radius: 8px; cursor: pointer; font-size: 7px; font-weight: bold; transition: 0.3s; text-transform: uppercase; }
        .btn.active { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 123, 255, 0.5); }
        .btn-full { grid-column: span 2; }
        .btn-danger { border-color: var(--danger); color: var(--danger); }
        .btn-danger.active { background: var(--danger); color: #fff; }
        input { width: 100%; background: #1c222d; border: 1px solid #333; padding: 10px; border-radius: 8px; margin-bottom: 10px; text-align: center; color: #fff; font-size: 10px; }
        .footer { text-align: center; margin-top: 15px; font-size: 8px; color: #444; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1>VITORZIN</h1>
            <input type="text" id="user" placeholder="USUÁRIO">
            <input type="password" id="pass" placeholder="SENHA">
            <button onclick="logar()" class="btn active" style="width:100%;">ENTRAR NO ARSENAL</button>
        </div>
    </div>

    <div class="container" id="panel">
        <h1>URIEL POWER MAX V10</h1>
        <div class="status-bar" id="st">CONTROLE DE MEMÓRIA: PRONTO</div>

        <span class="section-tag">Proteção (Manual)</span>
        <div class="grid">
            <button class="btn btn-full" style="color:#28a745; border-color:#28a745;" onclick="inject(this, 'BLINDAGEM TOTAL', 'Universal_Shield_V10.bin')">🛡️ ARQUIVO ÚNICO: BLINDAGEM SUPREMA</button>
        </div>

        <span class="section-tag">Poder do Uriel (Arquivos Grandes)</span>
        <div class="grid">
            <button class="btn btn-full" style="color:#ffc107; border-color:#ffc107;" onclick="inject(this, 'AUTO HS 100%', 'Uriel_Ultra_Head_100.so')">💀 AUTO HS 100% (ARQUIVO PESADO)</button>
            <button class="btn" onclick="inject(this, 'REGEDIT SUPREMA', 'Uriel_Regedit_Pro.xml')">⚙️ REGEDIT MAX</button>
            <button class="btn" onclick="inject(this, 'FAST KILL', 'Uriel_Bullet_Trace.so')">⚡ FAST KILL</button>
            <button class="btn btn-full" onclick="inject(this, 'ESP AURA AZUL', 'Isaelzzq_Aura_Blue.so')">✨ ESP AURA AZUL + AUXÍLIO</button>
        </div>

        <span class="section-tag">Funções Agressivas (Risco de Ban)</span>
        <div class="grid">
            <button class="btn btn-danger" onclick="inject(this, 'FLY HACK', 'Uriel_Fly_V3.so')">✈️ VOO (FLY)</button>
            <button class="btn btn-danger" onclick="inject(this, 'SPEED HACK', 'Uriel_Speed_X5.so')">🏃 SPEED X5</button>
        </div>

        <span class="section-tag">Reparo & Limpeza</span>
        <div class="grid">
            <button class="btn" onclick="inject(this, 'FIX DATA', 'Android_Data_Fixer.sh')">🛠️ FIX INJEÇÃO</button>
            <button class="btn" onclick="inject(this, 'DEEP CLEAN', 'Rastro_Zero_Deep.so')">🧹 DEEP CLEAN</button>
        </div>

        <div class="footer">AVISO: FUNÇÕES VERMELHAS SÃO PARA CONTAS BOT<br>VITORZIN SUPREMO © 2026</div>
    </div>

    <script>
        function logar() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "vitorzin" && (p === "1" || p === "vitorzin senha 1")) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('panel').style.display = 'block';
            } else { alert("ACESSO NEGADO!"); }
        }

        function inject(btn, name, file) {
            const st = document.getElementById('st');
            if(!btn.classList.contains('active')) {
                btn.classList.add('active');
                st.innerText = `INJETANDO: ${file} (PESADO)`;
                st.style.color = "#28a745";
                console.log(`Carregando biblioteca de alto impacto: ${file}`);
            } else {
                btn.classList.remove('active');
                st.innerText = `LIMPANDO REGISTROS...`;
                st.style.color = "#007bff";
            }
        }
    </script>
</body>
</html>
