<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITORZIN - SUPREMO MANUAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #007bff; --bg: #0b0e14; --card: #151921; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Orbitron', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #login-screen { position: fixed; width: 100%; height: 100%; background: var(--bg); z-index: 100; display: flex; justify-content: center; align-items: center; }
        .login-card { background: var(--card); padding: 40px; border-radius: 20px; text-align: center; border: 2px solid var(--primary); width: 320px; }
        .container { display: none; width: 95%; max-width: 400px; background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid #333; }
        h1 { color: var(--primary); text-align: center; font-size: 20px; margin-bottom: 20px; letter-spacing: 2px; }
        .status-bar { background: rgba(0, 123, 255, 0.1); padding: 10px; border-radius: 8px; font-size: 9px; color: var(--primary); margin-bottom: 20px; border: 1px solid var(--primary); text-align: center; font-weight: bold; height: 45px; display: flex; align-items: center; justify-content: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { background: #1c222d; border: 1px solid #333; color: #fff; padding: 14px 8px; border-radius: 10px; cursor: pointer; font-size: 8px; font-weight: bold; transition: 0.3s; text-transform: uppercase; }
        .btn.active { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 123, 255, 0.5); }
        .btn-full { grid-column: span 2; }
        .btn-safety { border: 1px solid #28a745; color: #28a745; }
        .btn-safety.active { background: #28a745; color: #fff; }
        .btn-ghost { border: 2px solid #6c757d; color: #adb5bd; background: rgba(108, 117, 125, 0.1); }
        .btn-ghost.active { background: #6c757d; color: #fff; box-shadow: 0 0 20px rgba(108, 117, 125, 0.6); }
        input { width: 100%; background: #1c222d; border: 1px solid #333; padding: 12px; border-radius: 10px; margin-bottom: 12px; text-align: center; color: #fff; outline: none; }
        .footer { text-align: center; margin-top: 25px; font-size: 9px; color: #444; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1>VITORZIN</h1>
            <input type="text" id="user" placeholder="USUÁRIO">
            <input type="password" id="pass" placeholder="SENHA">
            <button onclick="logar()" class="btn active" style="width:100%;">AUTENTICAR</button>
        </div>
    </div>

    <div class="container" id="panel">
        <h1>SISTEMA VITORZIN</h1>
        <div class="status-bar" id="st">⚠️ AGUARDANDO ATIVAÇÃO MANUAL</div>

        <span style="font-size: 9px; color: #777; margin-bottom: 10px; display: block; text-align: center;">PROTEÇÃO AVANÇADA (DISFARÇADA)</span>
        <div class="grid">
            <button class="btn btn-full btn-ghost" onclick="inject(this, 'BLINDAGEM TOTAL', '0xGHOST_BYPASS', 'Universal_Shield_V10.bin')">🌑 ARQUIVO ÚNICO: BLINDAGEM TOTAL (V10)</button>
            
            <button class="btn btn-safety" onclick="inject(this, 'ANTI-BAN', 'Bypass_Kernel_V9', 'V9_STABLE')">🛡️ ANTI-BAN V9</button>
            <button class="btn btn-safety" onclick="inject(this, 'ANTI-BLACKLIST', 'Deep_Scan_AB', 'AB_ELITE')">🛡️ ANTI-BLACKLIST</button>
        </div>

        <span style="font-size: 9px; color: #777; margin: 15px 0 10px 0; display: block; text-align: center;">FUNÇÕES ISAELZZQ & URIEL</span>
        <div class="grid">
            <button class="btn btn-full" style="color: #00f2ff; border-color: #00f2ff;" onclick="inject(this, 'ESP AURA AZUL', '0x7C3B9', 'Aura_Blue_Legit')">✨ ESP AURA AZUL + AUXÍLIO</button>
            <button class="btn" onclick="inject(this, 'GRUDAR CABEÇA', '0xHead_99', 'Stick_Full')">🎯 GRUDAR CABEÇA</button>
            <button class="btn" onclick="inject(this, 'FAKE LAG', '0xLag_V2', 'Lag_Hard')">👻 FAKE LAG</button>
            <button class="btn btn-full" onclick="inject(this, 'LIMPEZA PROFUNDA', 'Clean_Deep', 'Rastro_Zero')">🧹 LIMPAR RASTROS (DEEP CLEAN)</button>
        </div>

        <div class="footer">PROTOCOLO DE SEGURANÇA MANUAL<br>ARQUIVO ÚNICO GHOST V10</div>
    </div>

    <script>
        function logar() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "vitorzin" && (p === "1" || p === "vitorzin senha 1")) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('panel').style.display = 'block';
            } else { alert("ACESSO NEGADO!"); }
        }

        function inject(btn, name, offset, file) {
            const st = document.getElementById('st');
            if(!btn.classList.contains('active')) {
                btn.classList.add('active');
                st.innerText = `[SUCCESS] ${name} ATIVADO`;
                st.style.color = "#28a745";
                
                if(file === 'Universal_Shield_V10.bin') {
                    console.log("Injetando Blindagem Híbrida (Anti-Ban + Anti-Blacklist + Stealth)...");
                }
            } else {
                btn.classList.remove('active');
                st.innerText = `SISTEMA AGUARDANDO...`;
                st.style.color = "#007bff";
            }
        }
    </script>
</body>
</html>
