<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { background: transparent; font-family: 'Arial', sans-serif; color: #fff; margin: 0; padding: 10px; }
        .painel { width: 250px; background: rgba(0, 0, 0, 0.9); border: 3px solid #00ffff; border-radius: 15px; padding: 15px; box-shadow: 0 0 25px #00ffff; }
        .title { color: #00ffff; text-align: center; font-size: 20px; font-weight: bold; text-shadow: 0 0 10px #00ffff; margin-bottom: 10px; }
        .cat { font-size: 11px; color: #666; margin-top: 15px; border-bottom: 1px solid #333; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        button { background: #111; color: #fff; border: 1px solid #00ffff; padding: 10px 5px; border-radius: 8px; font-size: 10px; cursor: pointer; transition: 0.3s; }
        button.active { background: #00ffff; color: #000; font-weight: bold; box-shadow: 0 0 15px #00ffff; }
        .danger { grid-column: span 2; background: #ff0000; border: none; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="painel">
        <div class="title">VITORZIN V30 EXTREME</div>
        
        <div class="cat">APELAÇÃO (AIMBOT)</div>
        <div class="grid">
            <button onclick="toggle(this, 'AIMBOT_FOCO')">AIMBOT 100% HS</button>
            <button onclick="toggle(this, 'AIM_LOCK')">AIMLOCK MAGNÉTICO</button>
            <button onclick="toggle(this, 'REG_EMU')">REGEDIT EMULADOR</button>
            <button onclick="toggle(this, 'SENSY_VIP')">SENSY IPHONE 15</button>
            <button onclick="toggle(this, 'NO_RECOIL')">TIRO ESTÁVEL (99%)</button>
            <button onclick="toggle(this, 'MAGIC_BULLET')">MAGIC BULLET</button>
        </div>

        <div class="cat">VISUAL (ESP / WALLHACK)</div>
        <div class="grid">
            <button onclick="toggle(this, 'ESP_LINE')">ESP LINHA (VERDE)</button>
            <button onclick="toggle(this, 'ESP_BOX')">ESP BOX 3D</button>
            <button onclick="toggle(this, 'ESP_NAME')">ESP NOME/DIST</button>
            <button onclick="toggle(this, 'ESP_SKEL')">ESP ESQUELETO</button>
        </div>

        <div class="cat">OUTROS XITS</div>
        <div class="grid">
            <button onclick="toggle(this, 'SPEED')">SPEED HACK (CORRER)</button>
            <button onclick="toggle(this, 'FLY')">FLY HACK (TESTE)</button>
            <button onclick="toggle(this, 'FAST_MED')">MEDKIT RÁPIDO</button>
            <button onclick="toggle(this, 'ANTENA')">ANTENA NA CABEÇA</button>
        </div>

        <button class="danger" onclick="fechar()">FECHAR E LIMPAR TUDO</button>
    </div>

    <script>
        function toggle(e, func) { 
            e.classList.toggle('active');
            if(window.XitVitorzin) { window.XitVitorzin.injetarFuncao(func); }
        }
        function fechar() { if(window.Android) window.Android.fecharPainel(); }
    </script>
</body>
</html>
