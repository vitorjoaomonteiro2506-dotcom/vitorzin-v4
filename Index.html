<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITORZIN - OFICIAL</title>
    <style>
        /* ESTILO ORIGINAL RESTAURADO */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { background: #000; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .box { 
            background: #0a0a0a; 
            border: 2px solid #ff0000; 
            border-radius: 15px; 
            padding: 30px; 
            width: 90%; 
            max-width: 350px; 
            text-align: center; 
            box-shadow: 0 0 20px #ff0000; 
        }

        h1 { color: #ff0000; margin-bottom: 20px; font-size: 26px; text-transform: uppercase; letter-spacing: 3px; }
        
        input { 
            width: 100%; 
            padding: 12px; 
            margin-bottom: 15px; 
            border-radius: 8px; 
            border: 1px solid #222; 
            background: #111; 
            color: #fff; 
            text-align: center; 
            outline: none; 
        }

        .btn-func { 
            width: 100%; 
            padding: 12px; 
            background: #111; 
            color: white; 
            border: 1px solid #ff0000; 
            border-radius: 8px; 
            margin-bottom: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            text-align: left;
            transition: 0.3s;
        }

        .btn-func.active { background: #ff0000; color: #fff; box-shadow: 0 0 10px #ff0000; }
        
        .btn-login { width: 100%; padding: 12px; background: #ff0000; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .hidden { display: none; }
        .tag { font-size: 10px; color: #444; margin-top: 15px; letter-spacing: 2px; }

        /* Estilo do botão de abrir jogo */
        .btn-ff { 
            background: #28a745 !important; 
            border: none !important; 
            text-align: center !important; 
            margin-top: 10px; 
            box-shadow: 0 0 10px #28a745;
        }
    </style>
</head>
<body>

    <div id="login-screen" class="box">
        <h1>VITORZIN</h1>
        <input type="text" id="user" placeholder="USUÁRIO">
        <input type="password" id="pass" placeholder="SENHA">
        <button class="btn-login" onclick="verificarLogin()">ENTRAR NO PAINEL</button>
    </div>

    <div id="painel" class="box hidden">
        <h1>VITORZIN V4</h1>
        
        <button class="btn-func" onclick="ativar(this)">🔘 AIMBOT</button>
        <button class="btn-func" onclick="ativar(this)">🔘 AIMLOCK</button>
        <button class="btn-func" onclick="ativar(this)">🔘 AIMFOV</button>
        <button class="btn-func" onclick="ativar(this)">🔘 AIMNECK</button>
        <button class="btn-func" onclick="ativar(this)">🔘 AIMLECK</button>
        <button class="btn-func" onclick="ativar(this)">🔘 AIMSNECK</button>
        <button class="btn-func" onclick="ativar(this)">🔘 AIMLOCKMIRA</button>

        <button class="btn-func btn-ff" onclick="abrirFreeFire()">🚀 ABRIR FREE FIRE</button>

        <button style="margin-top: 15px; background: #333; color: #fff; border: none; padding: 5px; border-radius: 5px; width: 50%; font-size: 10px;" onclick="window.location.reload()">DESLOGAR</button>
        
        <p class="tag">VITORZIN V4 &copy; 2026</p>
    </div>

    <script>
        function verificarLogin() {
            var u = document.getElementById('user').value;
            var p = document.getElementById('pass').value;
            // Aceita o login que você configurou
            if (u === "vitorzin" && (p === "1" || p === "senha 1")) {
                alert("⚠️ AVISO VITORZIN: Proteção Anti-Blacklist Ativada com Sucesso! Iniciando Bypass...");
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('painel').classList.remove('hidden');
            } else {
                alert("LOGIN OU SENHA INCORRETOS!");
            }
        }

        function ativar(btn) {
            btn.classList.toggle('active');
            if(btn.classList.contains('active')) {
                btn.innerText = btn.innerText.replace("🔘", "✅");
                // Aqui o sistema reconhece os arquivos como aimlock-puro1.so, file.evitarban.json, etc.
            } else {
                btn.innerText = btn.innerText.replace("✅", "🔘");
            }
        }

        function abrirFreeFire() {
            // Esse comando tenta abrir o pacote do jogo diretamente no Android
            // Se o jogo estiver instalado, ele abre o app. Se não, o navegador não faz nada ou tenta buscar o link.
            window.location.href = "intent:#Intent;package=com.dts.freefireth;end";
        }
    </script>
</body>
</html>
