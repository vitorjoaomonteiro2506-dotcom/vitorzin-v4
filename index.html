<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Privado</title>
    <style>
        body { background: #050505; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; alignItems: center; height: 100vh; margin: 0; }
        .box { background: #111; border: 1px solid #0070f3; padding: 30px; border-radius: 10px; width: 320px; text-align: center; box-shadow: 0 0 20px rgba(0, 112, 243, 0.2); }
        input { width: 90%; padding: 12px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #333; background: #000; color: #fff; text-align: center; }
        button { width: 100%; padding: 12px; background: #0070f3; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        button:hover { background: #0056b3; }
        .hidden { display: none; }
        .func-btn { background: #222; margin-top: 10px; border: 1px solid #444; }
        .func-btn:hover { border-color: #00ff00; color: #00ff00; }
        #status { font-size: 12px; color: #888; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="login-screen" class="box">
        <h2>LOGIN</h2>
        <input type="password" id="pass" placeholder="SENHA">
        <button onclick="logar()">ENTRAR</button>
    </div>

    <div id="panel-screen" class="box hidden">
        <h2 style="color: #0070f3;">ADMIN PANEL</h2>
        <p id="status">Sistema Online</p>
        <button class="func-btn" onclick="acao('Otimização de FPS')">OTIMIZAR FPS</button>
        <button class="func-btn" onclick="acao('Limpeza de Logs')">LIMPAR LOGS</button>
        <button class="func-btn" onclick="acao('Bypass')">ATIVAR BYPASS</button>
        <button onclick="location.reload()" style="margin-top: 20px; background: #444;">SAIR</button>
    </div>

    <script>
        function logar() {
            const p = document.getElementById('pass').value;
            if (p === "1") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('panel-screen').classList.remove('hidden');
            } else {
                alert("Senha errada!");
            }
        }

        function acao(nome) {
            document.getElementById('status').innerText = "Processando " + nome + "...";
            setTimeout(() => {
                document.getElementById('status').innerText = nome + " ATIVADO!";
                alert(nome + " foi injetado com sucesso!");
            }, 1000);
        }
    </script>
</body>
</html>
