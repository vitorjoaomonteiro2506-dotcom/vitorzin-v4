<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body { background: transparent; margin: 0; padding: 0; font-family: sans-serif; }
        
        /* BOTÃO FLUTUANTE */
        #floatBtn {
            width: 55px; height: 55px; background: rgba(255, 0, 0, 0.7);
            border: 2px solid #fff; border-radius: 50%; position: fixed;
            top: 100px; left: 20px; z-index: 9999; display: flex;
            justify-content: center; align-items: center; color: white;
            font-weight: bold; font-size: 11px; box-shadow: 0 0 10px #000;
        }

        /* MENU */
        #menu {
            width: 260px; background: rgba(0, 0, 0, 0.9); border: 1.5px solid red;
            border-radius: 10px; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); display: none; z-index: 10000;
            color: white; padding: 15px;
        }

        .item { display: flex; justify-content: space-between; margin-bottom: 15px; align-items: center; }
        .switch { width: 40px; height: 20px; background: #444; border-radius: 20px; position: relative; }
        .switch.on { background: red; }
        .switch:after { content: ''; width: 16px; height: 16px; background: white; border-radius: 50%; position: absolute; top: 2px; left: 2px; transition: 0.3s; }
        .switch.on:after { left: 22px; }
    </style>
</head>
<body>

<div id="floatBtn" onclick="toggle()">MENU</div>

<div id="menu">
    <h3 style="text-align:center; color:red; margin-top:0;">VITORZIN V30</h3>
    
    <div class="item">
        <span>ESP LINE (LINHAS)</span>
        <div class="switch" id="esp" onclick="exec('ESP', 'esp_line', this)"></div>
    </div>
    
    <div class="item">
        <span>AIMLOCK (100%)</span>
        <div class="switch" id="aim" onclick="exec('AIM', 'aim_lock', this)"></div>
    </div>

    <button onclick="toggle()" style="width:100%; padding:8px; background:#333; color:white; border:none; border-radius:5px;">FECHAR</button>
</div>

<script>
    function toggle() {
        var m = document.getElementById('menu');
        m.style.display = (m.style.display === 'none' || m.style.display === '') ? 'block' : 'none';
    }

    function exec(nome, cmd, el) {
        el.classList.toggle('on');
        var status = el.classList.contains('on');
        
        // COMANDO PARA O ANDROID (SKETCHWARE)
        if(window.Android) {
            window.Android.injectMemory(cmd, status ? "ON" : "OFF");
        }
        console.log(nome + " está " + (status ? "LIGADO" : "DESLIGADO"));
    }

    // ARRASTAR BOTÃO
    var btn = document.getElementById('floatBtn');
    btn.ontouchmove = function(e) {
        var t = e.touches[0];
        btn.style.left = t.clientX - 27 + 'px';
        btn.style.top = t.clientY - 27 + 'px';
    }
</script>
</body>
</html>
