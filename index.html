<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITORZIN - ISAELZZQ EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #007bff; --bg: #0b0e14; --card: #151921; --text: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Orbitron', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #login-screen { position: fixed; width: 100%; height: 100%; background: var(--bg); z-index: 100; display: flex; justify-content: center; align-items: center; }
        .login-card { background: var(--card); padding: 40px; border-radius: 20px; text-align: center; border: 2px solid var(--primary); width: 320px; }
        .container { display: none; width: 95%; max-width: 400px; background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid #333; }
        h1 { color: var(--primary); text-align: center; font-size: 20px; margin-bottom: 20px; letter-spacing: 2px; }
        .status-bar { background: rgba(0, 123, 255, 0.1); padding: 10px; border-radius: 8px; font-size: 9px; color: var(--primary); margin-bottom: 20px; border: 1px solid var(--primary); text-align: center; font-weight: bold; height: 40px; display: flex; align-items: center; justify-content: center; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { background: #1c222d; border: 1px solid #333; color: #fff; padding: 14px 8px; border-radius: 10px; cursor: pointer; font-size: 8px; font-weight: bold; transition: 0.3s; text-transform: uppercase; }
        .btn.active { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 123, 255, 0.5); }
        .btn-full { grid-column: span 2; }
        .btn-isael { background: #0056b3; border: 1px solid #00f2ff; }
        input { width: 100%; background: #1c222d; border: 1px solid #333; padding: 12px; border-radius: 10px; margin-bottom: 12px; text-align: center; color: #fff; outline: none; }
        .footer { text-align: center; margin-top: 25px; font-size: 9px; color: #444; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1>VITORZIN</h1>
            <input type="text" id="user" placeholder="USUÁRIO">
            <input type="password" id="pass" placeholder="SENHA">
            <button onclick="logar()" class="btn active" style="width:100%;">AUTENTICAR</button>
        </div>
    </div>

    <div class="container" id="panel">
        <h1>VITORZIN x ISAELZZQ</h1>
        <div class="status-bar" id="st">🛡️ BYPASS & ANTI-BLACKLIST ATIVOS</div>

        <div class="grid">
            <button class="btn btn-full btn-isael" onclick="inject(this, 'ESP AURA AZUL + AUXÍLIO', '0xHead_99', 'Isaelzzq_Combo.so')">✨ ESP AURA AZUL + AUXÍLIO (ISAELZZQ)</button>
            
            <button class="btn" onclick="inject(this, 'GRUDAR CABEÇA', '0x2A1F8', 'Stick_Head_Full')">🎯 GRUDAR CABEÇA</button>
            <button class="btn" onclick="inject(this, 'AIMLOCK DISFARÇADO', '0x1B4D2', 'Aimlock_Smooth')">AIMLOCK SOFT</button>
            
            <button class="btn btn-full" style="background: #6f42c1;" onclick="inject(this, 'FAKE LAG', '0x4D8E2', 'Lag_Hard_V2')">👻 FAKE LAG (MOV. DURA)</button>
        </div>

        <div class="grid" style="margin-top: 15px;">
            <button class="btn btn-full active" onclick="inject(this, 'ANTI-BAN', 'Bypass_Kernel', 'V9_Active')">🛡️ ANTI-BAN REFORÇADO (ATIVO)</button>
            <button class="btn btn-full active" onclick="inject(this, 'ANTI-BLACKLIST', 'Deep_Scan', 'AB_Active')">🛡️ ANTI-BLACKLIST TOTAL (ATIVO)</button>
        </div>

        <div class="footer">MODO ISAELZZQ 100% DISFARÇADO<br>0% RASTREAMENTO DETECTADO</div>
    </div>

    <script>
        function logar() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "vitorzin" && (p === "1" || p === "vitorzin senha 1")) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('panel').style.display = 'block';
                console.log("Injetando Bypass e Anti-Blacklist no Kernel...");
            } else { alert("ACESSO NEGADO!"); }
        }

        function inject(btn, name, offset, file) {
            const st = document.getElementById('st');
            if(!btn.classList.contains('active')) {
                btn.classList.add('active');
                st.innerText = `INJETADO: ${file} NO OFFSET ${offset}`;
                st.style.color = "#28a745";
                
                if(file === 'Isaelzzq_Combo.so') {
                    console.log("Aplicando ESP AURA BLUE (Disfarçada) + Isaelzzq AimAssist...");
                }
            } else {
                btn.classList.remove('active');
                st.innerText = `LIMPANDO REGISTROS...`;
                st.style.color = "#ff4444";
                setTimeout(() => {
                    st.innerText = `SISTEMA 100% DISFARÇADO`;
                    st.style.color = "#007bff";
                }, 600);
            }
        }
    </script>
</body>
</html>
