<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITORZIN - SUPREMO V10</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #007bff; --bg: #0b0e14; --card: #151921; --text: #ffffff; --safe: #28a745; --danger: #ff4444; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Orbitron', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        #login-screen { position: fixed; width: 100%; height: 100%; background: var(--bg); z-index: 100; display: flex; justify-content: center; align-items: center; }
        .login-card { background: var(--card); padding: 40px; border-radius: 20px; text-align: center; border: 2px solid var(--primary); width: 320px; }
        .container { display: none; width: 100%; max-width: 400px; background: var(--card); border-radius: 20px; padding: 25px; border: 1px solid #333; }
        h1 { color: var(--primary); text-align: center; font-size: 18px; margin-bottom: 20px; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0, 123, 255, 0.5); }
        .status-bar { background: rgba(0, 123, 255, 0.05); padding: 12px; border-radius: 8px; font-size: 9px; color: var(--primary); margin-bottom: 20px; border: 1px solid #333; text-align: center; font-weight: bold; }
        .grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .btn { background: #1c222d; border: 1px solid #333; color: #fff; padding: 18px; border-radius: 12px; cursor: pointer; font-size: 9px; font-weight: bold; transition: 0.3s; text-transform: uppercase; }
        .btn.active { background: var(--primary); border-color: var(--primary); box-shadow: 0 0 15px rgba(0, 123, 255, 0.5); }
        .btn-exp { border-color: var(--danger); color: var(--danger); font-size: 10px; }
        .btn-exp.active { background: var(--danger); color: #fff; }
        input { width: 100%; background: #0b0e14; border: 1px solid #333; padding: 12px; border-radius: 10px; margin-bottom: 12px; text-align: center; color: #fff; outline: none; }
        .footer { text-align: center; margin-top: 25px; font-size: 8px; color: #444; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-card">
            <h1>VITORZIN</h1>
            <input type="text" id="user" placeholder="USUÁRIO">
            <input type="password" id="pass" placeholder="SENHA">
            <button onclick="logar()" class="btn" style="width:100%; color: var(--primary);">AUTENTICAR</button>
        </div>
    </div>

    <div class="container" id="panel">
        <h1>POWER INJECTOR</h1>
        <div class="status-bar" id="st">PRONTO PARA INJETAR PODER</div>

        <div class="grid">
            <button class="btn" onclick="inject(this, 'BLINDAGEM TOTAL', 'libarm_protect.so + config.so')">🛡️ ATIVAR SEGURANÇA SUPREMA</button>

            <button class="btn btn-exp" onclick="inject(this, 'MACRO NÍVEL XITADO', 'macro_v10_ultra.py')">🔥 MACRO INSANO (V10 ELITE)</button>

            <button class="btn btn-exp" onclick="inject(this, 'NO RECOIL FULL HEAD', 'weapon_reg_head_only.so')">🎯 NO RECOIL (SÓ CABEÇA)</button>
            
            <button class="btn" onclick="inject(this, 'FIX DATA', 'Android_Data_Fixer')">🛠️ REPARAR INJEÇÃO</button>
        </div>

        <div class="footer">SISTEMA VITORZIN X VOLPP<br>COMPATÍVEL COM VERCEL 2026</div>
    </div>

    <script>
        function logar() {
            const u = document.getElementById('user').value;
            const p = document.getElementById('pass').value;
            if(u === "vitorzin" && (p === "1" || p === "vitorzin senha 1")) {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('panel').style.display = 'block';
            } else { alert("ACESSO NEGADO!"); }
        }

        function inject(btn, name, file) {
            const st = document.getElementById('st');
            if(!btn.classList.contains('active')) {
                btn.classList.add('active');
                st.innerText = `[SUCCESS] ${name} INJETADO!`;
                st.style.color = "#28a745";
                
                // Lógica de injeção baseada nos seus arquivos
                if(name.includes('MACRO')) {
                    console.log("Aplicando Regedit Sensivity + Macro Py...");
                }
                if(name.includes('RECOIL')) {
                    console.log("Aplicando Shaders de Weapon Stability (Head Only)...");
                }
            } else {
                btn.classList.remove('active');
                st.innerText = `REMOVENDO ${name}...`;
                st.style.color = "#007bff";
            }
        }
    </script>
</body>
</html>
