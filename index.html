<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>VITORZIN V30 VIP</title>
    <style>
        body { background: transparent; font-family: sans-serif; margin: 0; padding: 5px; }
        .menu { width: 210px; background: rgba(10, 10, 10, 0.95); border: 2px solid #ff0000; border-radius: 12px; padding: 10px; box-shadow: 0 0 20px #ff0000; }
        .title { color: #ff0000; font-size: 18px; text-align: center; font-weight: bold; text-shadow: 0 0 10px #ff0000; margin-bottom: 10px; }
        .tab-name { color: #555; font-size: 10px; margin-top: 10px; border-bottom: 1px solid #333; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 5px; }
        button { background: #222; color: #fff; border: 1px solid #444; padding: 8px 2px; border-radius: 5px; font-size: 11px; cursor: pointer; transition: 0.3s; }
        button.active { background: #ff0000; color: #fff; box-shadow: 0 0 10px #ff0000; border: none; }
        .full { grid-column: span 2; background: #b10000; }
    </style>
</head>
<body>
    <div class="menu">
        <div class="title">VITORZIN V30 VIP</div>
        
        <div class="tab-name">AIM ASSIST (FAMOSOS)</div>
        <div class="grid">
            <button onclick="toggle(this)">AIMBOT 100%</button>
            <button onclick="toggle(this)">AIMLOCK VIP</button>
            <button onclick="toggle(this)">REGEDIT EXT</button>
            <button onclick="toggle(this)">SENSY EMULADOR</button>
        </div>

        <div class="tab-name">VISUAL & ESP (APELÃO)</div>
        <div class="grid">
            <button onclick="toggle(this)">ESP LINE</button>
            <button onclick="toggle(this)">ESP BOX</button>
            <button onclick="toggle(this)">ESP DISTANCE</button>
            <button onclick="toggle(this)">ESP NAME</button>
        </div>

        <div class="tab-name">AUXÍLIO DE TIRO</div>
        <div class="grid">
            <button onclick="toggle(this)">NO RECOIL</button>
            <button onclick="toggle(this)">FAST RELOAD</button>
            <button onclick="toggle(this)">TIRO RÁPIDO</button>
            <button onclick="toggle(this)">GELO RÁPIDO</button>
        </div>

        <div class="tab-name">SISTEMA PROTECT</div>
        <div class="grid">
            <button onclick="toggle(this)">ANTI-BAN 2.0</button>
            <button onclick="toggle(this)">BYPASS LOGS</button>
        </div>

        <button class="full" style="margin-top:15px;" onclick="fechar()">FECHAR E LIMPAR</button>
    </div>

    <script>
        function toggle(e) { e.classList.toggle('active'); }
        function fechar() { if(window.Android) window.Android.fecharPainel(); }
    </script>
</body>
</html>
