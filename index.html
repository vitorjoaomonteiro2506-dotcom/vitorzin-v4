<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITORZINW V4 - MOBILE VIP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Arial', sans-serif; }
        body { background: #050505; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .box { background: #111; border: 2px solid #ff0000; border-radius: 15px; padding: 30px; width: 90%; max-width: 350px; text-align: center; box-shadow: 0 0 20px #ff0000; }
        h1 { color: #ff0000; margin-bottom: 20px; font-size: 22px; text-transform: uppercase; letter-spacing: 2px; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #333; background: #222; color: #fff; text-align: center; outline: none; }
        input:focus { border-color: #ff0000; }
        button { width: 100%; padding: 12px; background: #ff0000; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #b30000; transform: scale(1.02); }
        .hidden { display: none; }
        .func { background: #1a1a1a; padding: 12px; margin: 10px 0; border-radius: 8px; border-left: 5px solid #ff0000; text-align: left; font-size: 14px; }
        .func span { color: #ff0000; float: right; font-weight: bold; }
        .status { font-size: 11px; color: #00ff00; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="login-screen" class="box">
        <h1>VITORZINW V4</h1>
        <p style="margin-bottom: 15px; font-size: 12px; color: #888;">PAINEL MOBILE 2026</p>
        <input type="text" id="user" placeholder="USUÁRIO">
        <input type="password" id="pass" placeholder="SENHA">
        <button onclick="verificarLogin()">ENTRAR NO PAINEL</button>
    </div>

    <div id="painel" class="box hidden">
        <h1>FUNÇÕES ATIVAS</h1>
        
        <div class="func">SENSI GERAL <span>141%</span></div>
        <div class="func">SENSI X/Y <span>75.65 / 0.85</span></div>
        <div class="func">AJUSTE VIP <span>16450</span></div>
        <div class="func">REGISTRO (HITREG) <span>ATIVADO</span></div>
        <div class="func">NO RECOIL <span>ATIVADO</span></div>
        
        <p class="status">● Sistema Anti-Ban Atualizado</p>
        <br>
        <button onclick="alert('Configurações aplicadas com sucesso!')">INJETAR SENSI</button>
    </div>

    <script>
        function verificarLogin() {
            var usuario = document.getElementById('user').value;
            var senha = document.getElementById('pass').value;

            // LOGIN: vitorzin | SENHA: 1
            if (usuario === "vitorzin" && senha === "1") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('painel').classList.remove('hidden');
            } else {
                alert("ACESSO NEGADO! Usuário ou senha incorretos.");
            }
        }
    </script>
</body>
</html>
