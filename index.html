<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JJ FOV - BASE</title>
    <style>
        :root {
            --primary: #007BFF;
            --primary-dark: #0040aa;
            --secondary: #FFFFFF;
            --dark-bg: #0a0f1d;
            --card-bg: #111827;
            --text-light: #f3f4f6;
            --text-muted: #9ca3af;
            --accent: #00f0ff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-light);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Tela de Login */
        #login-screen {
            background: linear-gradient(145deg, #111827, #0b0f19);
            padding: 40px 30px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 123, 255, 0.2);
            width: 90%;
            max-width: 360px;
            border: 1px solid rgba(0, 123, 255, 0.3);
        }

        .login-logo {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: 3px;
            color: var(--secondary);
            text-shadow: 0 0 10px var(--primary);
            margin-bottom: 5px;
        }

        input[type="password"] {
            width: 85%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--primary);
            background-color: #1f2937;
            margin: 20px 0;
            outline: none;
            font-size: 16px;
            text-align: center;
            color: var(--accent);
        }

        .btn-action {
            background: linear-gradient(90deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 123, 255, 0.4);
            width: 100%;
        }

        .btn-action:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 20px var(--accent);
        }
