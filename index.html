<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VITORZIN SUPREMO v6.0 | FULL POWER PANEL</title>
    <style>
        /* CONFIGURAÇÕES TÉCNICAS E CORES ORIGINAIS */
        :root {
            --primary: #ff0000;
            --secondary: #0a0a0a;
            --accent: #00ff00;
            --warning: #ffcc00;
            --text-main: #ffffff;
            --text-dim: #888888;
            --panel-w: 100%; /* Ajustado para preencher o Stecware */
        }

        * { box-sizing: border-box; outline: none; }

        body {
            background-color: #050505;
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* CONTAINER COM EFEITO SCANNER */
        .injector-frame {
            width: 100%;
            max-width: 450px;
            background: var(--secondary);
            border: 2px solid var(--primary);
            border-radius: 12px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        .injector-frame::after {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 3px;
            background: var(--primary);
            box-shadow: 0 0 15px var(--primary);
            animation: scan 4s linear infinite;
            opacity: 0.5;
            pointer-events: none;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .header {
            background: linear-gradient(180deg, #000 0%, #1a0000 100%);
            padding: 15px;
            text-align: center;
            border-bottom: 2px solid var(--primary);
        }

        .header h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 4px;
            text-shadow: 0 0 15px var(--primary);
        }

        .status-strip {
            background: #000;
            padding: 8px 12px;
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            font-family: monospace;
            border-bottom: 1px solid #222;
        }

        /* TERMINAL DE LOGS */
        .terminal-box {
            background: #000;
            height: 120px;
            margin: 10px;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #333;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: var(--accent);
            overflow-y: auto;
            box-shadow: inset 0 0 10px #00ff0011;
        }

        /* LISTA DE FUNÇÕES */
        .functions-container {
            padding: 10px;
            overflow-y: auto;
        }

        .function-item {
            background: #111;
            border: 1px solid #222;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .function-item:hover { border-color: var(--primary); background: #1a0505; }

        .func-label b { display: block; font-size: 13px; color: #fff; }
        .func-label span { font-size: 9px; color: var(--primary); text-transform: uppercase; }

        /* SWITCH TOGGLE */
        .switch { position: relative; display: inline-block; width: 38px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 14px; width: 14px;
            left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--primary); box-shadow: 0 0 8px var(--primary); }
        input:checked + .slider:before { transform: translateX(18px); }

        .btn-update {
            background: var(--primary);
            color: #fff;
            padding: 12px;
            border: none;
            width: 100%;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="injector-frame">
    <div class="header">
        <h1>VITORZIN SUPREMO</h1>
        <div style="font-size:9px; color:var(--accent)">KERNEL V6.0 | STEWARE PRO READY</div>
    </div>

    <div class="status-strip">
        <span>SISTEMA: <span style="color:var(--accent)">ONLINE</span></span>
        <span>USER: vitorzin</span>
    </div>

    <div class="terminal-box" id="term">
        [SYS] Aguardando comando...<br>
        [AUTH] vitorzin conectado.
    </div>

    <div class="functions-container">
        <div class="function-item">
            <div class="func-label"><b>AUTO HEADSHOT</b><span>Aimlock Destrutivo</span></div>
            <label class="switch">
                <input type="checkbox" onchange="stec('AUTO_HS', this)">
                <span class="slider"></span>
            </label>
        </div>

        <div class="function-item">
            <div class="func-label"><b>MIRA LEVE</b><span>Smooth Aim Engine</span></div>
            <label class="switch">
                <input type="checkbox" onchange="stec('SMOOTH', this)">
                <span class="slider"></span>
            </label>
        </div>

        <div class="function-item">
            <div class="func-label"><b>ESP LINE & BOX</b><span>Renderização Directx</span></div>
            <label class="switch">
                <input type="checkbox" onchange="stec('ESP', this)">
                <span class="slider"></span>
            </label>
        </div>

        <div class="function-item">
            <div class="func-label"><b>TELEPORT KILL</b><span>Risco de Ban: Alto</span></div>
            <label class="switch">
                <input type="checkbox" onchange="stec('TELE', this)">
                <span class="slider"></span>
            </label>
        </div>
        
        <button class="btn-update" onclick="sync()">SINCRONIZAR (vitorzin senha 1)</button>
    </div>
</div>

<script>
    const term = document.getElementById('term');

    function writeTerminal(text, type = 'success') {
        const color = type === 'error' ? "#ff0000" : (type === 'process' ? "#ffff00" : "#00ff00");
        term.innerHTML += `<br><span style="color:${color}">[${new Date().toLocaleTimeString()}] ${text}</span>`;
        term.scrollTop = term.scrollHeight;
    }

    // COMANDO PARA STEWARE PRO
    function stec(func, el) {
        const status = el.checked ? "1" : "0";
        writeTerminal(`Protocolo ${func}: ${el.checked ? 'ATIVADO' : 'DESATIVADO'}`, el.checked ? 'process' : 'error');
        
        try {
            // Tenta os métodos de integração do Stecware
            window.external.OnClick(func, status);
            window.chrome.webview.postMessage(func + ":" + status);
        } catch(e) { console.log("Host não detectado"); }
    }

    function sync() {
        writeTerminal("Sincronizando arquivos...", "process");
        setTimeout(() => writeTerminal(">>> 1000% FUNCIONAL <<<", "success"), 1000);
    }
</script>

</body>
</html>
